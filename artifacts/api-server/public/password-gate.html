<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Required</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #12121a;
      --border:    rgba(255,255,255,0.08);
      --primary:   #00e5ff;
      --text:      #e4e4f0;
      --muted:     #6b7280;
      --error:     #f87171;
      --radius:    16px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }

    .icon {
      width: 48px;
      height: 48px;
      background: rgba(0,229,255,0.1);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .icon svg { width: 24px; height: 24px; color: var(--primary); }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      text-align: center;
      color: #fff;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .domain {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      color: var(--primary);
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .message {
      font-size: 0.875rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    .field {
      position: relative;
      margin-bottom: 1rem;
    }

    input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #fff;
      font-size: 1rem;
      letter-spacing: 0.1em;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: rgba(0,229,255,0.4);
      background: rgba(0,229,255,0.03);
    }

    input[type="password"].error {
      border-color: var(--error);
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    button {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--primary);
      color: #000;
      font-size: 0.9375rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    button:hover  { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      font-size: 0.8125rem;
      color: var(--error);
      text-align: center;
      margin-top: 0.75rem;
      min-height: 1.25rem;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: rgba(107,114,128,0.6);
      text-align: center;
    }

    .footer a { color: rgba(0,229,255,0.5); text-decoration: none; }
    .footer a:hover { color: var(--primary); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <h1 id="title">Password Required</h1>
    <p class="domain" id="domain-label"></p>
    <p class="message" id="message">This site is password protected. Enter the password to continue.</p>

    <div class="field">
      <input
        type="password"
        id="password"
        placeholder="Enter password"
        autocomplete="current-password"
        autofocus
      />
    </div>

    <button id="submit-btn" type="button">
      <span id="btn-label">Unlock</span>
      <span class="spinner" id="spinner"></span>
    </button>

    <p class="error-msg" id="error-msg"></p>
  </div>

  <p class="footer">
    Hosted on <a href="https://github.com/The-No-Hands-company/Federated-Hosting" target="_blank" rel="noopener">FedHost</a>
  </p>

  <script>
    (function () {
      // Read site data injected by the server into <body> attributes
      const body     = document.body;
      const siteId   = body.getAttribute("data-site-id");
      const domain   = body.getAttribute("data-domain") || location.hostname;
      const message  = body.getAttribute("data-message");

      if (domain)  document.getElementById("domain-label").textContent = domain;
      if (message) document.getElementById("message").textContent = message;

      const input     = document.getElementById("password");
      const btn       = document.getElementById("submit-btn");
      const btnLabel  = document.getElementById("btn-label");
      const spinner   = document.getElementById("spinner");
      const errorMsg  = document.getElementById("error-msg");

      function setLoading(on) {
        btn.disabled   = on;
        spinner.style.display = on ? "block" : "none";
        btnLabel.textContent  = on ? "Checking…" : "Unlock";
      }

      function setError(msg) {
        errorMsg.textContent = msg;
        input.classList.add("error");
        setTimeout(() => input.classList.remove("error"), 400);
        input.select();
      }

      async function submit() {
        const password = input.value.trim();
        if (!password) { input.focus(); return; }

        setLoading(true);
        errorMsg.textContent = "";

        try {
          const res = await fetch(`/api/sites/${siteId}/unlock`, {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "same-origin",
            body: JSON.stringify({ password }),
          });

          const data = await res.json();

          if (res.ok && data.unlocked) {
            // Cookie set by server — reload to serve the site
            btnLabel.textContent = "✓ Unlocked!";
            setTimeout(() => location.reload(), 300);
            return;
          }

          if (res.status === 429) {
            setError("Too many attempts. Try again in 15 minutes.");
          } else {
            setError(data.error || "Incorrect password. Please try again.");
          }
        } catch {
          setError("Network error. Please try again.");
        } finally {
          setLoading(false);
        }
      }

      btn.addEventListener("click", submit);
      input.addEventListener("keydown", (e) => { if (e.key === "Enter") submit(); });
    })();
  </script>
</body>
</html>
