# Grafana dashboard provisioning
# Place this file at /etc/grafana/provisioning/dashboards/nexushosting.yaml

apiVersion: 1

providers:
  - name: NexusHosting
    orgId: 1
    folder: NexusHosting
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
